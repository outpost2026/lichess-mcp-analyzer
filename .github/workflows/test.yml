name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: uv sync

      - name: Generate dummy cache for contract tests
        run: uv run python scripts/generate_dummy_cache.py

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run python -X utf8 -m pytest tests/ -v --tb=short
